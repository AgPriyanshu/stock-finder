version: 1
disable_existing_loggers: false

formatters:
  standard:
    format: "%(asctime)s %(levelname)s %(name)s %(message)s"
    datefmt: "%Y-%m-%dT%H:%M:%S"

handlers:
  console:
    class: logging.StreamHandler
    stream: ext://sys.stdout
    formatter: standard

# Root logger — level can be overridden at runtime via the LOG_LEVEL env var
# (uvicorn reads this file directly; for Django the LOGGING dict in settings.py
#  takes precedence, but this file is passed to uvicorn via --log-config).
root:
  level: INFO
  handlers: [console]

loggers:
  uvicorn:
    level: INFO
    handlers: [console]
    propagate: false

  uvicorn.error:
    level: INFO
    handlers: [console]
    propagate: false

  uvicorn.access:
    level: INFO
    handlers: [console]
    propagate: false

  django:
    level: INFO
    handlers: [console]
    propagate: false

  django.request:
    level: WARNING
    handlers: [console]
    propagate: false

  # Keep DB query logging quiet — too noisy at INFO.
  django.db.backends:
    level: WARNING
    handlers: [console]
    propagate: false

  apps:
    level: DEBUG
    handlers: [console]
    propagate: false

  celery:
    level: INFO
    handlers: [console]
    propagate: false
