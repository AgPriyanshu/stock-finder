[tool.ruff]
line-length = 120
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]
ignore = ["E501"]

[tool.ruff.lint.isort]
known-first-party = ["stock_finder", "apps", "shared"]

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "stock_finder.settings"
python_files = ["tests.py", "test_*.py"]
