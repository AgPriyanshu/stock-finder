name: Build & Push Docker Images

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  OWNER: agpriyanshu

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # BACKEND
  # ───────────────────────────────────────────────────────────────────────────
  backend:
    name: Backend Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.OWNER }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/stock-finder-backend
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Registry cache — one tag per platform so they never overwrite each
          # other, and no 10 GB GHA cache eviction.
          cache-from: |
            type=registry,ref=${{ env.REGISTRY }}/${{ env.OWNER }}/stock-finder-backend:buildcache-amd64
            type=registry,ref=${{ env.REGISTRY }}/${{ env.OWNER }}/stock-finder-backend:buildcache-arm64
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.OWNER }}/stock-finder-backend:buildcache-amd64,mode=max

  # ───────────────────────────────────────────────────────────────────────────
  # FRONTEND
  # ───────────────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.OWNER }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Prepare env file
        run: cp frontend/env-files/.env.production frontend/.env.production

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/stock-finder-frontend
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=registry,ref=${{ env.REGISTRY }}/${{ env.OWNER }}/stock-finder-frontend:buildcache-amd64
            type=registry,ref=${{ env.REGISTRY }}/${{ env.OWNER }}/stock-finder-frontend:buildcache-arm64
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.OWNER }}/stock-finder-frontend:buildcache-amd64,mode=max
