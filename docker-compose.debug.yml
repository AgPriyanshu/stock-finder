version: "3.4"

# Debug variant: launches the Django web service under debugpy on port 5678.
# Usage: docker compose -f docker-compose.debug.yml up --build web
services:
  web:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: stock_finder_backend
    command: >
      sh -c "pip install debugpy -t /tmp && python /tmp/debugpy --wait-for-client --listen 0.0.0.0:5678 -m uvicorn stock_finder.asgi:application --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
      - "5678:5678"
    container_name: stock_finder_web_debug
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    env_file: ./.env

  db:
    image: postgis/postgis:17-3.4
    container_name: stock_finder_db_debug
    environment:
      POSTGRES_DB: ${DB_NAME:-stock_finder}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    ports:
      - "5431:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  redis:
    image: redis:7-alpine
    container_name: stock_finder_redis_debug
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
