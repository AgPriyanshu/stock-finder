apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: frontend-route
spec:
  parentRefs:
    - name: platform-gateway
      namespace: gateway-ns
      sectionName: http
  hostnames:
    - "stock-finder.shop"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: ExtensionRef
          extensionRef:
            group: gateway.nginx.org
            kind: SnippetsFilter
            name: frontend-rate-limit
      backendRefs:
        - name: frontend-app-service
          port: 80
          namespace: default
---
