apiVersion: v1
kind: ConfigMap
metadata:
  name: seaweedfs-s3-config
data:
  config.json: |
    {
      "identities": [
        {
          "name": "backend-app",
          "credentials": [
            {
              "accessKey": "seaweedfsadmin",
              "secretKey": "seaweedfsadmin123"
            }
          ],
          "actions": [
            "Admin",
            "Read",
            "Write"
          ]
        },
        {
          "name": "anonymous",
          "actions": ["Read"]
        }
      ]
    }
  security.toml: |
    [cors.allowed_origins]
    values = "https://worldofapps.bar,https://api.worldofapps.bar,http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173"
