services:
  web:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stock_finder_web
    command: uvicorn stock_finder.asgi:application --host 0.0.0.0 --port 8000 --reload
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1g
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      seaweedfs:
        condition: service_started
    env_file: ./.env

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stock_finder_worker
    command: celery -A stock_finder worker -l info
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1g
    volumes:
      - ./backend:/app
    entrypoint: ""
    depends_on:
      redis:
        condition: service_started
      db:
        condition: service_healthy
    env_file: ./.env

  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stock_finder_beat
    command: celery -A stock_finder beat -l info
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256m
    volumes:
      - ./backend:/app
    entrypoint: ""
    depends_on:
      redis:
        condition: service_started
      db:
        condition: service_healthy
    env_file: ./.env

  db:
    platform: linux/amd64
    image: postgis/postgis:17-3.4
    container_name: stock_finder_db
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1g
    environment:
      POSTGRES_DB: ${DB_NAME:-stock_finder}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    ports:
      - "5431:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  redis:
    image: redis:7-alpine
    container_name: stock_finder_redis
    command: >
      redis-server --loglevel warning --slowlog-log-slower-than -1
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256m
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data

  seaweedfs:
    image: chrislusf/seaweedfs:latest
    container_name: stock_finder_seaweedfs
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512m
    entrypoint:
      - /bin/sh
      - -c
    command:
      - |
        mkdir -p /etc/seaweedfs/s3-config
        cat <<EOF >/etc/seaweedfs/s3-config/config.json
        {
          "identities": [
            {
              "name": "backend-app",
              "credentials": [
                {
                  "accessKey": "${S3_ACCESS_KEY}",
                  "secretKey": "${S3_SECRET_KEY}"
                }
              ],
              "actions": ["Admin", "Read", "Write"]
            },
            {
              "name": "anonymous",
              "actions": ["Read"]
            }
          ]
        }
        EOF
        exec weed server \
          -s3 \
          -s3.port=8333 \
          -s3.config=/etc/seaweedfs/s3-config/config.json \
          -dir=/data \
          -volume.max=0
    ports:
      - "9333:9333"
      - "8080:8080"
      - "8333:8333"
    volumes:
      - ./data/seaweedfs:/data
    environment:
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-seaweedfsadmin}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-seaweedfsadmin123}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9333/cluster/status"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    profiles:
      - "frontend"
    build:    
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    container_name: stock_finder_frontend
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256m
    ports:
      - "80:80"
    depends_on:
      - web
    environment:
      - BACKEND_UPSTREAM=web:8000
